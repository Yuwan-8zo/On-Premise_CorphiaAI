<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Corphia AI Platform - 企業級私有部署 AI 問答系統，支援 RAG 與本地可信資料庫" />
    <meta name="keywords" content="Corphia, AI, Chat, RAG, 企業級 AI, 私有部署, ChatGPT" />
    <meta name="author" content="Corphia AI Team" />
    
    <!-- Security Headers (Meta fallback) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: http: https:;" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Open Graph (Facebook/LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Corphia AI - 企業級私有部署解決方案" />
    <meta property="og:description" content="專為企業打造的本地 AI 問答系統，支援 RAG 技術與文件分析。" />
    <meta property="og:image" content="/apple-touch-icon.png" />
    <meta property="og:url" content="https://corphia.ai/" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Corphia AI - 企業知識大腦" />
    <meta name="twitter:description" content="專為企業打造的本地 AI 問答系統，支援 RAG 技術與文件分析。" />
    <meta name="twitter:image" content="/apple-touch-icon.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://corphia.ai/" />
    
    <title>Corphia AI - Enterprise LLM Platform</title>
    <!--
      Theme-color：使用兩組 prefers-color-scheme 媒體查詢作為靜態 fallback；
      下方 boot script 會依使用者偏好 + 當前路徑動態覆寫單一 meta theme-color，
      確保 Safari 工具列顏色第一次繪製就正確。
      值與 frontend/src/index.css 的 --bg-base / --bg-surface 同步。
    -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F6F4F0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#202022" />
    <meta id="color-scheme-meta" name="color-scheme" content="light dark" />
    <!-- iOS Safari 狀態列：透明黑、可全螢幕 PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!--
      Boot script — 必須在任何 React/Vite 代碼執行前跑：
      1. 讀 localStorage 拿出使用者主題偏好（fallback prefers-color-scheme）
      2. 依當前路徑挑色：'/' 或 '/chat*' 用 surface 色，其他用 base 色
      3. 寫入 html.style.backgroundColor、colorScheme，並覆寫 meta[theme-color] 為單一動態值
      這樣 Safari 第一次繪製就能拿到正確背景色，不會閃黑。
    -->
    <script>
      (function() {
        try {
          var DARK_BASE = '#202022';
          var DARK_SURFACE = '#28282A';
          var LIGHT_BASE = '#F6F4F0';
          var LIGHT_SURFACE = '#F2EFEA';

          // 預設跟系統，若使用者在設定明確選了 light/dark 就覆寫
          var theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var stored = localStorage.getItem('ui-storage');
          if (stored) {
            var state = (JSON.parse(stored) || {}).state || {};
            var pref = state.themePreference || state.theme; // 後者是舊版相容
            if (pref === 'light' || pref === 'dark') theme = pref;
          }

          var path = window.location.pathname;
          var isChat = path === '/' || path.indexOf('/chat') === 0;
          var bg;
          if (theme === 'dark') {
            bg = isChat ? DARK_SURFACE : DARK_BASE;
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'only dark';
          } else {
            bg = isChat ? LIGHT_SURFACE : LIGHT_BASE;
            document.documentElement.style.colorScheme = 'only light';
          }
          document.documentElement.style.backgroundColor = bg;

          // 移除靜態 prefers-color-scheme 的兩組 meta，改成單一動態值（覆寫 Safari）
          var staticMetas = document.querySelectorAll('meta[name="theme-color"]');
          staticMetas.forEach(function(m) { m.parentNode.removeChild(m); });
          var meta = document.createElement('meta');
          meta.setAttribute('name', 'theme-color');
          meta.setAttribute('content', bg);
          document.head.appendChild(meta);

          var csMeta = document.getElementById('color-scheme-meta');
          if (csMeta) csMeta.setAttribute('content', theme === 'dark' ? 'only dark' : 'only light');
        } catch(e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

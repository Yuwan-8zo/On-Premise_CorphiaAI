<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Corphia AI Platform - 企業級私有部署 AI 問答系統" />
    <title>Corphia AI</title>
    <!-- 預設主题色：根據系統 prefers-color-scheme 決定預設顏色 -->
    <meta id="theme-color-meta" name="theme-color" content="#f0f2f5" />
    <meta id="color-scheme-meta" name="color-scheme" content="light" />
    <!--
      重要：這段同步 script 必須在任何 React 代碼執行前就讀取 localStorage 並設定就好主顔Ꞩ
      這樣 Safari 在第一次畫面時就能讀到正確的背景色
      (Gemini 跟 ChatGPT 都是用這個方法解決 Safari 白邊問題)
    -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('ui-storage');
          var theme = 'light';
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed && parsed.state && parsed.state.theme) {
              theme = parsed.state.theme;
            }
          } else {
            // 無儲存設定時，跟隨系統主題
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#1a1a1a';
            document.documentElement.style.colorScheme = 'dark';
            document.getElementById('theme-color-meta').setAttribute('content', '#1a1a1a');
            document.getElementById('color-scheme-meta').setAttribute('content', 'dark');
          } else {
            document.documentElement.style.backgroundColor = '#f0f2f5';
            document.documentElement.style.colorScheme = 'light';
          }
        } catch(e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

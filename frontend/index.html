<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Corphia AI Platform - 企業級私有部署 AI 問答系統，支援 RAG 與本地可信資料庫" />
    <meta name="keywords" content="Corphia, AI, Chat, RAG, 企業級 AI, 私有部署, ChatGPT" />
    <meta name="author" content="Corphia AI Team" />
    
    <!-- Security Headers (Meta fallback) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: http: https:;" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Open Graph (Facebook/LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Corphia AI - 企業級私有部署解決方案" />
    <meta property="og:description" content="專為企業打造的本地 AI 問答系統，支援 RAG 技術與文件分析。" />
    <meta property="og:image" content="/apple-touch-icon.png" />
    <meta property="og:url" content="https://corphia.ai/" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Corphia AI - 企業知識大腦" />
    <meta name="twitter:description" content="專為企業打造的本地 AI 問答系統，支援 RAG 技術與文件分析。" />
    <meta name="twitter:image" content="/apple-touch-icon.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://corphia.ai/" />
    
    <title>Corphia AI - Enterprise LLM Platform</title>
    <!-- 預設主题色：根據系統 prefers-color-scheme 決定預設顏色 -->
    <meta id="theme-color-meta" name="theme-color" content="#f0f2f5" />
    <meta id="color-scheme-meta" name="color-scheme" content="only light" />
    <!--
      重要：這段同步 script 必須在任何 React 代碼執行前就讀取 localStorage 並設定就好主顔Ꞩ
      這樣 Safari 在第一次畫面時就能讀到正確的背景色
      (Gemini 跟 ChatGPT 都是用這個方法解決 Safari 白邊問題)
    -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('ui-storage');
          var theme = 'light';
          if (stored) {
            var parsed = JSON.parse(stored);
            if (parsed && parsed.state && parsed.state.theme) {
              theme = parsed.state.theme;
            }
          } else {
            // 無儲存設定時，跟隨系統主題
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            var currentPath = window.location.pathname;
            var initialBg = '#1a1a1a';
            if (currentPath === '/' || currentPath.startsWith('/chat')) { initialBg = '#212121'; }
            else if (currentPath === '/login' || currentPath === '/register') { initialBg = '#131314'; }
            
            document.documentElement.style.backgroundColor = initialBg;
            document.documentElement.style.colorScheme = 'only dark';
            document.getElementById('theme-color-meta').setAttribute('content', initialBg);
            document.getElementById('color-scheme-meta').setAttribute('content', 'only dark');
          } else {
            document.documentElement.style.backgroundColor = '#f0f2f5';
            document.documentElement.style.colorScheme = 'only light';
          }
        } catch(e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

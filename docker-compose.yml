# Corphia AI - PostgreSQL + pgvector only
#
# The application itself runs locally. Docker is used only for the database:
#   docker compose up -d
#   docker exec -it corphia-postgres psql -U corphia -d corphia_ai

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: corphia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corphia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corphia123}
      POSTGRES_DB: ${POSTGRES_DB:-corphia_ai}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - corphia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-corphia} -d ${POSTGRES_DB:-corphia_ai}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  corphia_pgdata:

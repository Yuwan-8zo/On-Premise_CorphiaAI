name: Corphia Design System — UI Lint Gate

on:
  push:
    branches: [ main, dev, 'feat/**', 'fix/**' ]
    paths:
      - 'frontend/src/**'
      - 'frontend/scripts/design-lint.mjs'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/src/**'

jobs:
  design-lint:
    name: 🎨 Design System Compliance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run Design System Lint
        id: design_lint
        run: node scripts/design-lint.mjs
        # exit code 1 = Errors found → CI fails
        # exit code 0 = Clean → CI passes

      - name: Post Lint Summary (on failure)
        if: failure()
        run: |
          echo "## ❌ Design System Violations Found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following violations were detected in the frontend source code:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          node scripts/design-lint.mjs 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to fix:" >> $GITHUB_STEP_SUMMARY
          echo "- Replace hex colors with \`corphia-*\` tokens" >> $GITHUB_STEP_SUMMARY
          echo "- Replace \`shadow-[...]\` with \`shadow-corphia-*\`" >> $GITHUB_STEP_SUMMARY
          echo "- Replace \`rounded-[Npx]\` with \`rounded-corphia-*\`" >> $GITHUB_STEP_SUMMARY
          echo "- Replace \`bg-white\`/\`bg-black\` with surface tokens" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`npm run design:lint\` locally to see all violations." >> $GITHUB_STEP_SUMMARY

      - name: Post Lint Summary (on success)
        if: success()
        run: |
          echo "## ✅ Design System — All Clear" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No design system violations detected. The UI token contracts are maintained." >> $GITHUB_STEP_SUMMARY

name: Corphia CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest
    
    # 使用 PostgreSQL 服務做為測試資料庫
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: corphia
          POSTGRES_PASSWORD: corphia123
          POSTGRES_DB: corphia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov httpx
        
    - name: Run Backend Tests
      working-directory: ./backend
      env:
        TEST_DATABASE_URL: postgresql+asyncpg://corphia:corphia123@localhost:5432/corphia_test
        SECRET_KEY: ci-test-secret-key
        APP_ENV: test
      run: |
        pytest tests/ --cov=app --cov-report=xml
        
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        cache: "npm"
        cache-dependency-path: ./frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
        
    - name: Run Frontend Tests
      working-directory: ./frontend
      run: npm run test -- --run
        
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"
        
    - name: Install Frontend dependencies
      working-directory: ./frontend
      run: npm install --legacy-peer-deps
      
    - name: Install Playwright Browsers
      working-directory: ./e2e
      run: npx playwright install --with-deps
      
    # 注意：實際 E2E 可能需要同時啟動前後端，這裡可以視您的架構調整
    # 如果僅測試 UI，可用 npm run dev 開啟前端並配合 Mock
    # 以下為示範如何安裝 E2E 專案依賴並執行（您可依需客製化）
    - name: Install E2E dependencies
      working-directory: ./e2e
      run: npm install @playwright/test
      
    - name: Run Playwright tests
      working-directory: ./e2e
      # 因為尚未準備好完整的 E2E CI 執行腳本 (需要前後端同時運行)，
      # 這裡我們先設定為 dry-run 或單純確保環境正常
      # run: npx playwright test
      run: echo "Playwright tests are configured but currently skipped in CI until full mock environment is set up."
